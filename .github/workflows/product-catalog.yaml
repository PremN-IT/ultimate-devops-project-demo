# CI for Product Catalog Service

name: product-catalog-ci

on:
    pull_request:
        branches:
        - main
    push: 
        branches:
        - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: checkout-code
              uses: actions/checkout@v4
            - name: setup Go 1.22
              uses: actions/setup-go@v2
              with:
                go-version: 1.22
            - name: Build
              run: go build -o product-catalog-service src/product-catalog/main.go

            - name: unit tests
              run: go test src/product-catalog/..

    code-quality:
        runs-on: ubuntu-latest

        steps:
            - name: checkout-code
              uses: actions/checkout@v4

            - name: Run golangci-lint
              run:
                      go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.56.2
                      golangci-lint run src/product-catalog/..
    docker:
        runs-on: ubuntu-latest

        needs: build
        steps:
          - name: checkout-code
            uses: actions/checkout@v4
          - name: Install Docker
            uses: docker/setup-buildx-action@v1
          - name: Login to Docker
            uses: docker/login-action@v3
            with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secretes.DOCKER_TOKEN }}
          - name: Docker Push
            uses: docker/build-push-action@v6
            with:
              context: src/product-catalog
              file: Dockerfile
              push: true
              tags: ${{ secrets.DOCKERHUB-USERNAME }}/product-catalog-service:${{github.run_id}}

    Updatek8s:
        runs-on: ubuntu-latest
        needs: docker
        steps:
          - name: checkout-code
            uses: actions/checkout@v4
            with: ${{ secrets.GitHub_TOKEN }}
            
    
                      
              
    
